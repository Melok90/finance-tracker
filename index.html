<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f11">
    <title>Finance Tracker</title>

    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        app: {
                            bg: '#121212',
                            card: '#1E1E1E',
                            cardHover: '#2A2A2A',
                            text: '#FFFFFF',
                            textMuted: '#A1A1AA',
                            border: '#333333',
                            pink: '#F472B6',
                            purple: '#A855F7',
                            blue: '#60A5FA',
                            teal: '#2DD4BF',
                            yellow: '#FBBF24',
                            green: '#4ADE80',
                            red: '#F87171'
                        }
                    },
                    spacing: {
                        'safe-top': 'env(safe-area-inset-top)',
                        'safe-bottom': 'env(safe-area-inset-bottom)',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        /* Скрытие скроллбара, но сохранение возможности скроллинга */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Оптимизация кнопок для мобильных устройств */
        button, a {
            -webkit-touch-callout: none;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Анимации для Bottom Sheet */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

        /* Сброс стилей инпута number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="antialiased selection:bg-app-purple selection:text-white h-[100dvh] w-full overflow-hidden flex justify-center">

    <div id="root" class="w-full max-w-md h-full relative bg-app-bg shadow-2xl overflow-hidden flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Иконки (SVG Components) ---
        const Icons = {
            Home: ({ active }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "#FFFFFF" : "#71717A"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Chart: ({ active }) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "#FFFFFF" : "#71717A"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Settings: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A1A1AA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Pencil: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A1A1AA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F87171" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Close: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#A1A1AA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            TrendingUp: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            TrendingDown: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F87171" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
            Cloud: ({ color }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color || "#A1A1AA"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Target: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            ChevronRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            ChevronUp: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
            ChevronDown: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            Grid: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg>,
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A1A1AA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        };

        // --- Данные по умолчанию ---
        const DEFAULT_CATEGORIES = [
            { id: '1', name: 'Продукты', icon: '🛒', color: '#F06A5F' },
            { id: '2', name: 'Транспорт', icon: '🚕', color: '#F6C34E' },
            { id: '3', name: 'Развлечения', icon: '🍿', color: '#D85BCF' },
            { id: '4', name: 'Кафе', icon: '☕', color: '#F39A3C' },
            { id: '5', name: 'Счета', icon: '📄', color: '#A56BD6' },
            { id: '6', name: 'Зарплата', icon: '💰', color: '#49D3B3' },
            { id: '7', name: 'Перевод', icon: '💳', color: '#6F7EDC' },
        ];

        const DEFAULT_GOALS = [
            { id: 'g1', title: 'На отпуск', targetAmount: 150000, currentAmount: 45000, color: '#6F7EDC', icon: '✈️' },
            { id: 'g2', title: 'Новый iPhone', targetAmount: 120000, currentAmount: 85000, color: '#A56BD6', icon: '📱' }
        ];

        const AVAILABLE_CURRENCIES = [
            { code: 'RUB', symbol: '₽', name: 'Рубль' },
            { code: 'USD', symbol: '$', name: 'Доллар' },
            { code: 'EUR', symbol: '€', name: 'Евро' },
            { code: 'GBP', symbol: '£', name: 'Фунт стерлингов' },
            { code: 'CNY', symbol: '¥', name: 'Юань' },
            { code: 'KZT', symbol: '₸', name: 'Тенге' }
        ];

        // --- Утилиты ---
        const formatMoney = (amount, currency = 'RUB') => {
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: currency, maximumFractionDigits: 0 }).format(amount);
        };
        const formatDate = (dateString) => {
            const options = { day: 'numeric', month: 'long' };
            return new Date(dateString).toLocaleDateString('ru-RU', options);
        };
        
        // Умное форматирование даты (Сегодня, Вчера)
        const formatRelativeDate = (dateString) => {
            const date = new Date(dateString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Сегодня';
            if (date.toDateString() === yesterday.toDateString()) return 'Вчера';
            return formatDate(dateString);
        };

        // Вибрация (Haptic Feedback) для мобильных устройств
        const vibrate = () => {
            if (typeof navigator !== 'undefined' && navigator.vibrate) {
                navigator.vibrate(50);
            }
        };

        // --- Компоненты ---

        // 1. Круговой прогресс (для копилок)
        const CircularProgress = ({ progress, color, icon, size = 60, strokeWidth = 6 }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = radius * 2 * Math.PI;
            const offset = circumference - (progress / 100) * circumference;

            return (
                <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
                    <svg className="transform -rotate-90" width={size} height={size}>
                        <circle cx={size / 2} cy={size / 2} r={radius} stroke="#333" strokeWidth={strokeWidth} fill="none" />
                        <circle cx={size / 2} cy={size / 2} r={radius} stroke={color} strokeWidth={strokeWidth} fill="none" 
                            strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" 
                            style={{ transition: 'stroke-dashoffset 0.5s ease-in-out' }}/>
                    </svg>
                    <div className="absolute text-xl">{icon}</div>
                </div>
            );
        };

        // 2. Пончиковая диаграмма (для аналитики)
        const DonutChart = ({ data, currency }) => {
            if (!data || data.length === 0) return (
                <div className="w-48 h-48 rounded-full border-4 border-app-border flex items-center justify-center text-app-textMuted mx-auto">Нет данных</div>
            );

            let cumulativePercent = 0;
            const conicGradients = data.map(slice => {
                const start = cumulativePercent;
                cumulativePercent += slice.percentage;
                return `${slice.color} ${start}% ${cumulativePercent}%`;
            }).join(', ');

            return (
                <div className="relative w-56 h-56 mx-auto flex items-center justify-center">
                    <div className="absolute inset-0 rounded-full" 
                         style={{ background: `conic-gradient(${conicGradients})`, maskImage: 'radial-gradient(transparent 55%, black 56%)', WebkitMaskImage: 'radial-gradient(transparent 55%, black 56%)' }}>
                    </div>
                    <div className="text-center z-10">
                        <p className="text-sm text-app-textMuted">Всего</p>
                        <p className="text-xl font-bold">{formatMoney(data.reduce((sum, item) => sum + item.amount, 0), currency)}</p>
                    </div>
                </div>
            );
        };

        // --- Главное Приложение ---
        const App = () => {
            // Состояние
            const [balances, setBalances] = useState(() => JSON.parse(localStorage.getItem('ft_balances')) || { RUB: 211800 });
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('ft_transactions')) || []);
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('ft_categories')) || DEFAULT_CATEGORIES);
            const [goals, setGoals] = useState(() => JSON.parse(localStorage.getItem('ft_goals')) || DEFAULT_GOALS);
            const [currency, setCurrency] = useState(() => localStorage.getItem('ft_currency') || 'RUB');
            const [activeCurrencies, setActiveCurrencies] = useState(() => JSON.parse(localStorage.getItem('ft_active_currencies')) || ['RUB']);
            const [showGoals, setShowGoals] = useState(() => {
                const saved = localStorage.getItem('ft_show_goals');
                return saved !== null ? JSON.parse(saved) : true;
            });
            
            const [currentTab, setCurrentTab] = useState('home'); // home, analytics
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isAddGoalModalOpen, setIsAddGoalModalOpen] = useState(false);
            const [selectedGoal, setSelectedGoal] = useState(null);
            const [isManageGoalModalOpen, setIsManageGoalModalOpen] = useState(false);
            const [isManageCategoriesOpen, setIsManageCategoriesOpen] = useState(false);
            const [isAddCategoryOpen, setIsAddCategoryOpen] = useState(false);
            const [isEditBalanceOpen, setIsEditBalanceOpen] = useState(false);
            const [isAddAccountOpen, setIsAddAccountOpen] = useState(false);

            // Состояние облака
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'finance-tracker-pwa';
            const [user, setUser] = useState(null);
            const [isCloudLoaded, setIsCloudLoaded] = useState(false);
            const [cloudStatus, setCloudStatus] = useState('offline'); // offline, syncing, online, error
            const dbRef = useRef(null);
            
            // 1. Инициализация и Авторизация Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        // Изолируем импорт от Babel компилятора
                        const dynamicImport = new Function('url', 'return import(url)');
                        
                        const { initializeApp } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const { getFirestore, doc, getDoc, setDoc } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        
                        dbRef.current = { db, doc, getDoc, setDoc };

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            if (!currentUser) {
                                setIsCloudLoaded(true); // Завершаем лоадер, если нет юзера
                            }
                        });
                    } catch (err) {
                        console.error("Firebase init failed:", err);
                        setIsCloudLoaded(true);
                        setCloudStatus('error');
                    }
                };
                initFirebase();
            }, []);

            // 2. Загрузка данных из облака после успешной авторизации
            useEffect(() => {
                if (!user || !dbRef.current) return;
                
                const loadData = async () => {
                    try {
                        const { db, doc, getDoc } = dbRef.current;
                        const stateDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appState', 'data');
                        const docSnap = await getDoc(stateDocRef);
                        
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if(data.balances) setBalances(data.balances);
                            if(data.transactions) setTransactions(data.transactions);
                            if(data.categories) setCategories(data.categories);
                            if(data.goals) setGoals(data.goals);
                            if(data.currency) setCurrency(data.currency);
                            if(data.activeCurrencies) setActiveCurrencies(data.activeCurrencies);
                            if(data.showGoals !== undefined) setShowGoals(data.showGoals);
                        }
                        setCloudStatus('online');
                    } catch(e) {
                        console.error("Ошибка загрузки из облака:", e);
                        setCloudStatus('error');
                    } finally {
                        setIsCloudLoaded(true);
                    }
                };
                
                loadData();
            }, [user, appId]);

            // 3. Синхронизация с облаком и localStorage при изменениях
            useEffect(() => {
                // Всегда дублируем локально
                localStorage.setItem('ft_balances', JSON.stringify(balances));
                localStorage.setItem('ft_transactions', JSON.stringify(transactions));
                localStorage.setItem('ft_categories', JSON.stringify(categories));
                localStorage.setItem('ft_goals', JSON.stringify(goals));
                localStorage.setItem('ft_currency', currency);
                localStorage.setItem('ft_active_currencies', JSON.stringify(activeCurrencies));
                localStorage.setItem('ft_show_goals', JSON.stringify(showGoals));

                // Если облако еще не загрузилось, не отправляем данные
                if (!isCloudLoaded || !user || !dbRef.current) return;
                
                const syncToCloud = async () => {
                    setCloudStatus('syncing');
                    try {
                        const { db, doc, setDoc } = dbRef.current;
                        const stateDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appState', 'data');
                        
                        await setDoc(stateDocRef, {
                            balances, transactions, categories, goals, currency, activeCurrencies, showGoals,
                            updatedAt: new Date().toISOString()
                        });
                        setCloudStatus('online');
                    } catch (err) {
                        console.error("Cloud sync failed:", err);
                        setCloudStatus('error');
                    }
                };

                // Debounce: ждем 1 секунду после изменений перед отправкой
                const timeoutId = setTimeout(() => {
                    syncToCloud();
                }, 1000);

                return () => clearTimeout(timeoutId);
            }, [balances, transactions, categories, goals, currency, activeCurrencies, showGoals, isCloudLoaded, user, appId]);

            // Данные активного счета
            const currentBalance = balances[currency] || 0;
            const currentTransactions = useMemo(() => transactions.filter(t => (t.currency || 'RUB') === currency), [transactions, currency]);
            const currentGoals = useMemo(() => goals.filter(g => (g.currency || 'RUB') === currency), [goals, currency]);

            // Вычисляемые данные для дашборда
            const currentMonthTransactions = useMemo(() => {
                const now = new Date();
                return currentTransactions.filter(t => {
                    const d = new Date(t.date);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                });
            }, [currentTransactions]);

            const monthlyIncome = currentMonthTransactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const monthlyExpense = currentMonthTransactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);

            const expensesByCategory = useMemo(() => {
                const expenses = currentMonthTransactions.filter(t => t.type === 'expense');
                const total = expenses.reduce((acc, t) => acc + t.amount, 0);
                if (total === 0) return [];

                const grouped = expenses.reduce((acc, t) => {
                    acc[t.categoryId] = (acc[t.categoryId] || 0) + t.amount;
                    return acc;
                }, {});

                return Object.entries(grouped)
                    .map(([id, amount]) => {
                        const cat = categories.find(c => c.id === id) || { name: 'Другое', color: '#666' };
                        return { id, name: cat.name, color: cat.color, amount, percentage: (amount / total) * 100 };
                    })
                    .sort((a, b) => b.amount - a.amount);
            }, [currentMonthTransactions, categories]);

            // Экран загрузки облака
            if (!isCloudLoaded) {
                return (
                    <div className="flex flex-col h-full bg-app-bg text-app-text items-center justify-center space-y-4">
                        <div className="w-12 h-12 border-4 border-app-border border-t-app-purple rounded-full animate-spin"></div>
                        <p className="text-app-textMuted text-sm font-medium">Синхронизация данных...</p>
                    </div>
                );
            }

            // Обработчики
            const handleAddTransaction = (transaction) => {
                vibrate();
                const newTransaction = { ...transaction, id: Date.now().toString(), currency };
                setTransactions([newTransaction, ...transactions]);
                
                const amountChange = transaction.type === 'expense' ? -transaction.amount : transaction.amount;
                setBalances(prev => ({ ...prev, [currency]: (prev[currency] || 0) + amountChange }));
                
                setIsAddModalOpen(false);
            };

            const handleDeleteTransaction = (id) => {
                vibrate();
                const t = transactions.find(t => t.id === id);
                if (!t) return;
                
                const amountChange = t.type === 'expense' ? t.amount : -t.amount;
                const tCurrency = t.currency || 'RUB';
                setBalances(prev => ({ ...prev, [tCurrency]: (prev[tCurrency] || 0) + amountChange }));
                
                setTransactions(transactions.filter(t => t.id !== id));
            };

            const handleTopUpGoal = (goalId, amount) => {
                if (currentBalance < amount) return false;
                
                vibrate();
                setBalances(prev => ({ ...prev, [currency]: (prev[currency] || 0) - amount }));
                setGoals(goals.map(g => g.id === goalId ? { ...g, currentAmount: Math.min(g.targetAmount, g.currentAmount + amount) } : g));
                
                // Добавляем техническую транзакцию
                const newTransaction = { id: Date.now().toString(), type: 'expense', amount, categoryId: 'goal_topup', date: new Date().toISOString(), comment: 'Пополнение цели', currency };
                setTransactions([newTransaction, ...transactions]);
                return true;
            };

            const handleAddGoal = (goalData) => {
                vibrate();
                const newGoal = {
                    id: 'g_' + Date.now(),
                    ...goalData,
                    currentAmount: 0,
                    currency
                };
                setGoals([...goals, newGoal]);
                setIsAddGoalModalOpen(false);
            };

            const handleEditGoal = (updatedGoal) => {
                vibrate();
                setGoals(goals.map(g => g.id === updatedGoal.id ? updatedGoal : g));
                setIsAddGoalModalOpen(false);
                setSelectedGoal(null);
            };

            const handleDeleteGoal = (goalId) => {
                vibrate();
                const goal = goals.find(g => g.id === goalId);
                if (goal) {
                    const gCurrency = goal.currency || 'RUB';
                    setBalances(prev => ({ ...prev, [gCurrency]: (prev[gCurrency] || 0) + goal.currentAmount }));
                    if (goal.currentAmount > 0) {
                        const newTransaction = { id: Date.now().toString(), type: 'income', amount: goal.currentAmount, categoryId: 'goal_refund', date: new Date().toISOString(), comment: `Возврат из удаленной цели "${goal.title}"`, currency: gCurrency };
                        setTransactions(prev => [newTransaction, ...prev]);
                    }
                    setGoals(goals.filter(g => g.id !== goalId));
                }
            };

            const handleEditBalance = () => {
                setIsEditBalanceOpen(true);
            };

            const handleAddCategory = (categoryData) => {
                vibrate();
                const newCategory = { ...categoryData, id: 'c_' + Date.now() };
                setCategories([...categories, newCategory]);
                setIsAddCategoryOpen(false);
            };

            const handleDeleteCategory = (categoryId) => {
                vibrate();
                setCategories(categories.filter(c => c.id !== categoryId));
            };

            const handleCurrencyChange = (newCurrency) => {
                if (newCurrency === currency) return;
                vibrate();
                setCurrency(newCurrency);
            };

            const handleAddAccount = (newCurrencyCode) => {
                vibrate();
                if (!activeCurrencies.includes(newCurrencyCode)) {
                    setActiveCurrencies([...activeCurrencies, newCurrencyCode]);
                    if (balances[newCurrencyCode] === undefined) {
                        setBalances(prev => ({ ...prev, [newCurrencyCode]: 0 }));
                    }
                }
                setCurrency(newCurrencyCode);
                setIsAddAccountOpen(false);
                setIsSettingsOpen(false);
            };

            const handleDeleteAccount = (codeToDelete) => {
                if (activeCurrencies.length <= 1) return;
                
                vibrate();
                
                // Удаляем счет из списка активных
                const newActive = activeCurrencies.filter(c => c !== codeToDelete);
                setActiveCurrencies(newActive);

                // Удаляем баланс этого счета
                const newBalances = { ...balances };
                delete newBalances[codeToDelete];
                setBalances(newBalances);

                // Удаляем все операции и копилки в этой валюте
                setTransactions(prev => prev.filter(t => (t.currency || 'RUB') !== codeToDelete));
                setGoals(prev => prev.filter(g => (g.currency || 'RUB') !== codeToDelete));

                // Если удаленный счет был активен, переключаемся на первый из оставшихся
                if (currency === codeToDelete) {
                    setCurrency(newActive[0]);
                }
            };

            // Экспорт/Импорт
            const exportData = () => {
                const data = { balances, transactions, categories, goals, currency, activeCurrencies };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `finance_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if(data.balances) setBalances(data.balances);
                        else if(data.balance !== undefined) setBalances({ RUB: data.balance }); // Поддержка старых бэкапов
                        
                        if(data.transactions) setTransactions(data.transactions);
                        if(data.categories) setCategories(data.categories);
                        if(data.goals) setGoals(data.goals);
                        if(data.currency) setCurrency(data.currency);
                        if(data.activeCurrencies) setActiveCurrencies(data.activeCurrencies);
                        else if (data.balances) setActiveCurrencies(Object.keys(data.balances));

                        alert('Данные успешно восстановлены!');
                        setIsSettingsOpen(false);
                    } catch (err) {
                        alert('Ошибка чтения файла');
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="flex flex-col h-full bg-app-bg text-app-text pt-safe-top pb-safe-bottom">
                    
                    {/* Header */}
                    <header className="flex justify-between items-center px-6 py-4">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-app-card rounded-lg flex items-center justify-center border border-app-border">
                                <span className="text-app-purple font-bold">FT</span>
                            </div>
                            <h1 className="font-semibold text-lg tracking-wide">Finance Tracker</h1>
                        </div>
                        <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-app-card rounded-full active:scale-95 transition-transform">
                            <Icons.Settings />
                        </button>
                    </header>

                    {/* Main Content Area: Увеличенный нижний отступ (pb-32) для адаптации под все виды телефонов */}
                    <main className="flex-1 overflow-y-auto hide-scrollbar px-6 pb-32">
                        {currentTab === 'home' ? (
                            <Dashboard 
                                balance={currentBalance} 
                                monthlyIncome={monthlyIncome} 
                                monthlyExpense={monthlyExpense}
                                expensesByCategory={expensesByCategory}
                                goals={currentGoals}
                                currency={currency}
                                activeCurrencies={activeCurrencies}
                                showGoals={showGoals}
                                onToggleGoals={() => { vibrate(); setShowGoals(!showGoals); }}
                                onCurrencyChange={handleCurrencyChange}
                                onEditBalance={handleEditBalance}
                                onGoalClick={(goal) => {
                                    setSelectedGoal(goal);
                                    setIsManageGoalModalOpen(true);
                                }}
                                onOpenAddGoal={() => {
                                    setSelectedGoal(null);
                                    setIsAddGoalModalOpen(true);
                                }}
                            />
                        ) : (
                            <Analytics 
                                transactions={currentTransactions} 
                                categories={categories}
                                currency={currency}
                                onDelete={handleDeleteTransaction}
                            />
                        )}
                    </main>
                    
                    {/* Tab Bar (Floating Card Style) */}
                    <div className="absolute bottom-6 left-5 right-5 z-40" style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                        <div className="bg-app-card/95 backdrop-blur-2xl border border-app-border shadow-2xl shadow-black/50 rounded-[2rem] flex justify-between items-center h-[76px] px-8">
                            <button onClick={() => { vibrate(); setCurrentTab('home'); }} className="flex flex-col items-center justify-center h-full px-4 active:scale-90 transition-transform">
                                <Icons.Home active={currentTab === 'home'} />
                            </button>
                            
                            {/* Prominent Light Center Button */}
                            <button 
                                onClick={() => { vibrate(); setIsAddModalOpen(true); }}
                                className="flex justify-center items-center w-[72px] h-[46px] bg-white rounded-[18px] active:scale-95 transition-transform shadow-md"
                            >
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                            </button>
                            
                            <button onClick={() => { vibrate(); setCurrentTab('analytics'); }} className="flex flex-col items-center justify-center h-full px-4 active:scale-90 transition-transform">
                                <Icons.Chart active={currentTab === 'analytics'} />
                            </button>
                        </div>
                    </div>

                    {/* Modals */}
                    {isAddModalOpen && (
                        <AddTransactionModal 
                            categories={categories} 
                            currency={currency}
                            onClose={() => setIsAddModalOpen(false)} 
                            onAdd={handleAddTransaction} 
                        />
                    )}

                    {isSettingsOpen && (
                        <SettingsModal
                            onClose={() => setIsSettingsOpen(false)}
                            onExport={exportData}
                            onImport={importData}
                            categories={categories}
                            currency={currency}
                            activeCurrencies={activeCurrencies}
                            cloudStatus={cloudStatus}
                            onCurrencyChange={handleCurrencyChange}
                            onOpenAddAccount={() => setIsAddAccountOpen(true)}
                            onManageCategories={() => { setIsSettingsOpen(false); setIsManageCategoriesOpen(true); }}
                            onDeleteAccount={handleDeleteAccount}
                        />
                    )}

                    {isAddAccountOpen && (
                        <AddAccountModal
                            activeCurrencies={activeCurrencies}
                            onClose={() => setIsAddAccountOpen(false)}
                            onAdd={handleAddAccount}
                        />
                    )}

                    {isManageCategoriesOpen && (
                        <ManageCategoriesModal
                            categories={categories}
                            onClose={() => setIsManageCategoriesOpen(false)}
                            onAdd={() => setIsAddCategoryOpen(true)}
                            onDelete={handleDeleteCategory}
                        />
                    )}

                    {isAddCategoryOpen && (
                        <AddCategoryModal
                            onClose={() => setIsAddCategoryOpen(false)}
                            onAdd={handleAddCategory}
                        />
                    )}

                    {isAddGoalModalOpen && (
                        <AddGoalModal
                            initialData={selectedGoal}
                            currency={currency}
                            onClose={() => { setIsAddGoalModalOpen(false); setSelectedGoal(null); }}
                            onSave={(goalData) => {
                                if (selectedGoal) {
                                    handleEditGoal(goalData);
                                } else {
                                    handleAddGoal(goalData);
                                }
                            }}
                        />
                    )}

                    {isManageGoalModalOpen && selectedGoal && (
                        <GoalDetailsModal
                            goal={selectedGoal}
                            currency={currency}
                            onClose={() => { setIsManageGoalModalOpen(false); setSelectedGoal(null); }}
                            onTopUp={(amount) => { 
                                const success = handleTopUpGoal(selectedGoal.id, amount); 
                                if (success) {
                                    setIsManageGoalModalOpen(false); 
                                    setSelectedGoal(null); 
                                }
                                return success;
                            }}
                            onEdit={() => { setIsManageGoalModalOpen(false); setIsAddGoalModalOpen(true); }}
                            onDelete={() => { handleDeleteGoal(selectedGoal.id); setIsManageGoalModalOpen(false); setSelectedGoal(null); }}
                            onComplete={() => { 
                                setGoals(goals.filter(g => g.id !== selectedGoal.id)); 
                                setIsManageGoalModalOpen(false); 
                                setSelectedGoal(null); 
                            }}
                        />
                    )}

                    {/* Модалка редактирования баланса */}
                    {isEditBalanceOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-app-card p-6 rounded-3xl border border-app-border w-80 space-y-4 shadow-2xl">
                                <h3 className="text-lg font-semibold text-center">Изменить баланс ({currency})</h3>
                                <input 
                                    type="number" 
                                    inputMode="decimal"
                                    id="balanceInput"
                                    defaultValue={currentBalance}
                                    className="w-full bg-app-bg p-4 rounded-xl outline-none border border-app-border focus:border-app-purple transition-colors text-center text-xl font-bold"
                                    autoFocus
                                />
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => setIsEditBalanceOpen(false)} className="flex-1 bg-app-bg border border-app-border py-3 rounded-xl font-medium active:scale-95 transition-transform text-sm">Отмена</button>
                                    <button onClick={() => { 
                                        const val = document.getElementById('balanceInput').value;
                                        if(!isNaN(val) && val !== '') {
                                            setBalances(prev => ({ ...prev, [currency]: parseFloat(val) }));
                                            setIsEditBalanceOpen(false);
                                        }
                                    }} className="flex-1 bg-app-purple text-white py-3 rounded-xl font-medium active:scale-95 transition-transform text-sm">Сохранить</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        // --- Вложенные Экраны ---
        const Dashboard = ({ balance, monthlyIncome, monthlyExpense, expensesByCategory, goals, currency, activeCurrencies, showGoals, onToggleGoals, onCurrencyChange, onEditBalance, onGoalClick, onOpenAddGoal }) => {
            return (
                <div className="space-y-8 animate-fade-in">
                    {/* Unified Balance & Summary Card */}
                    <div className="bg-gradient-to-br from-app-card to-[#161618] p-6 rounded-[2rem] border border-app-border relative overflow-hidden shadow-lg">
                        <div className="absolute -top-10 -right-10 w-32 h-32 bg-app-purple/20 blur-3xl rounded-full pointer-events-none"></div>

                        <div className="space-y-6 relative z-10">
                            {/* Balance Header with Currency Switcher */}
                            <div className="flex justify-between items-start">
                                <div className="space-y-1.5">
                                    <div className="flex items-center gap-2 text-app-textMuted text-sm font-medium">
                                        Доступный остаток
                                        <button onClick={onEditBalance} className="p-1 active:bg-white/5 rounded-md transition-colors"><Icons.Pencil /></button>
                                    </div>
                                    <div className="text-[2.75rem] leading-[1.1] font-bold tracking-tight">
                                        {formatMoney(balance, currency)}
                                    </div>
                                </div>
                                
                                {/* Quick Currency Switcher inside Card */}
                                {activeCurrencies.length > 1 && (
                                    <div className="flex bg-black/30 rounded-xl p-1 border border-white/10 backdrop-blur-md shadow-inner">
                                        {activeCurrencies.map(c => {
                                            const curInfo = AVAILABLE_CURRENCIES.find(x => x.code === c);
                                            return (
                                            <button 
                                                key={c}
                                                onClick={() => onCurrencyChange(c)}
                                                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${currency === c ? 'bg-[#333333] text-white shadow-md' : 'text-app-textMuted hover:text-white'}`}
                                            >
                                                {curInfo ? curInfo.symbol : c}
                                            </button>
                                        )})}
                                    </div>
                                )}
                            </div>

                            {/* Compact Stats row */}
                            <div className="flex items-center justify-between bg-black/20 p-3 rounded-2xl border border-white/5 backdrop-blur-sm">
                                <div className="flex-1 flex items-center gap-3 pl-1">
                                    <div className="w-8 h-8 rounded-full bg-app-green/10 text-app-green flex items-center justify-center shrink-0">
                                        <Icons.TrendingUp />
                                    </div>
                                    <div className="min-w-0">
                                        <div className="text-[10px] text-app-textMuted uppercase tracking-wider font-medium mb-0.5">Доходы</div>
                                        <div className="font-semibold text-sm truncate">{formatMoney(monthlyIncome, currency)}</div>
                                    </div>
                                </div>
                                
                                <div className="w-px h-8 bg-app-border/50 shrink-0 mx-2"></div>

                                <div className="flex-1 flex items-center gap-3 pl-1">
                                    <div className="w-8 h-8 rounded-full bg-app-red/10 text-app-red flex items-center justify-center shrink-0">
                                        <Icons.TrendingDown />
                                    </div>
                                    <div className="min-w-0">
                                        <div className="text-[10px] text-app-textMuted uppercase tracking-wider font-medium mb-0.5">Расходы</div>
                                        <div className="font-semibold text-sm truncate">{formatMoney(monthlyExpense, currency)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Goals */}
                    <div className="space-y-4">
                        <div 
                            className="flex justify-between items-center active:opacity-70 transition-opacity cursor-pointer -mx-2 px-2 py-1 rounded-lg" 
                            onClick={onToggleGoals}
                        >
                            <h2 className="font-semibold text-lg">Мои цели</h2>
                            <div className="text-app-textMuted p-1">
                                {showGoals ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                            </div>
                        </div>
                        
                        {showGoals && (
                            <div className="flex gap-3 overflow-x-auto hide-scrollbar -mx-6 px-6 pb-2 animate-fade-in">
                                {goals.map(goal => {
                                    const isCompleted = goal.currentAmount >= goal.targetAmount;
                                    return (
                                    <div key={goal.id} className={`w-[160px] p-2.5 rounded-2xl border shrink-0 cursor-pointer active:scale-95 transition-transform flex items-center gap-2.5 ${isCompleted ? 'bg-app-green/10 border-app-green/30' : 'bg-app-card border-app-border'}`} onClick={() => onGoalClick(goal)}>
                                        <div className="relative shrink-0">
                                            <CircularProgress progress={(goal.currentAmount/goal.targetAmount)*100} color={isCompleted ? '#4ADE80' : goal.color} icon={goal.icon} size={38} strokeWidth={3} />
                                            {isCompleted && (
                                                <div className="absolute -top-1 -right-1 w-4 h-4 bg-app-green text-[#121212] rounded-full flex items-center justify-center shadow-md border border-app-bg">
                                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <h3 className="font-medium text-[13px] truncate mb-0.5">{goal.title}</h3>
                                            <div className={`text-[10px] truncate ${isCompleted ? 'text-app-green font-medium' : 'text-app-textMuted'}`}>
                                                {isCompleted ? 'Выполнено' : `${formatMoney(goal.currentAmount, currency)} / ${formatMoney(goal.targetAmount, currency)}`}
                                            </div>
                                        </div>
                                    </div>
                                )})}
                                
                                <button 
                                    onClick={onOpenAddGoal}
                                    className="pr-4 pl-2.5 py-2.5 bg-transparent border-2 border-dashed border-app-border rounded-2xl flex items-center justify-center gap-2.5 text-app-textMuted active:scale-95 transition-all shrink-0 hover:border-app-purple/50"
                                >
                                    <div className="w-9 h-9 rounded-full bg-app-card flex items-center justify-center border border-app-border shrink-0">
                                        <Icons.Plus />
                                    </div>
                                    <span className="text-[13px] font-medium">Новая цель</span>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Expense Structure */}
                    <div className="space-y-5 bg-app-card p-5 rounded-3xl border border-app-border">
                        <h2 className="font-semibold text-lg">Структура расходов</h2>
                        
                        {expensesByCategory.length > 0 ? (
                            <>
                                <div className="flex w-full h-10 rounded-xl overflow-hidden gap-1">
                                    {expensesByCategory.map(item => (
                                        <div key={item.id} style={{ width: `${item.percentage}%`, backgroundColor: item.color }} className="h-full transition-all duration-500 rounded-sm first:rounded-l-xl last:rounded-r-xl" />
                                    ))}
                                </div>
                                
                                <div className="grid grid-cols-2 gap-y-4 gap-x-2 pt-2">
                                    {expensesByCategory.map(item => (
                                        <div key={item.id} className="flex justify-between items-center pr-2">
                                            <div className="flex items-center gap-2">
                                                <div className="w-1 h-8 rounded-full" style={{ backgroundColor: item.color }}></div>
                                                <div>
                                                    <div className="text-sm font-medium">{item.name}</div>
                                                    <div className="text-xs text-app-textMuted">{formatMoney(item.amount, currency)}</div>
                                                </div>
                                            </div>
                                            <div className="text-sm font-semibold">{item.percentage.toFixed(1)}%</div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <p className="text-sm text-app-textMuted text-center py-4">В этом месяце расходов нет 😌</p>
                        )}
                    </div>
                </div>
            );
        };

        const Analytics = ({ transactions, categories, currency, onDelete }) => {
            const [period, setPeriod] = useState('month'); // week, month, year
            const [deletingTx, setDeletingTx] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');

            // Фильтрация транзакций по выбранному периоду и поиску
            const filteredTransactions = useMemo(() => {
                const now = new Date();
                const lowerQuery = searchQuery.toLowerCase();

                return transactions.filter(t => {
                    const d = new Date(t.date);
                    let timeMatch = true;

                    if (period === 'month') {
                        timeMatch = d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    } else if (period === 'year') {
                        timeMatch = d.getFullYear() === now.getFullYear();
                    } else if (period === 'week') {
                        // Последние 7 дней
                        const pastWeek = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                        timeMatch = d >= pastWeek && d <= now;
                    }

                    if (!timeMatch) return false;

                    // Поиск
                    if (searchQuery) {
                        const cat = categories.find(c => c.id === t.categoryId);
                        const catName = cat ? cat.name.toLowerCase() : '';
                        const comment = (t.comment || '').toLowerCase();
                        const amountStr = t.amount.toString();

                        return catName.includes(lowerQuery) || comment.includes(lowerQuery) || amountStr.includes(lowerQuery);
                    }

                    return true;
                });
            }, [transactions, period, searchQuery, categories]);

            // Динамический пересчет категорий для графика
            const expensesByCategory = useMemo(() => {
                const expenses = filteredTransactions.filter(t => t.type === 'expense');
                const total = expenses.reduce((acc, t) => acc + t.amount, 0);
                if (total === 0) return [];

                const grouped = expenses.reduce((acc, t) => {
                    acc[t.categoryId] = (acc[t.categoryId] || 0) + t.amount;
                    return acc;
                }, {});

                return Object.entries(grouped)
                    .map(([id, amount]) => {
                        const cat = categories.find(c => c.id === id) || { name: 'Другое', color: '#666' };
                        return { id, name: cat.name, color: cat.color, amount, percentage: (amount / total) * 100 };
                    })
                    .sort((a, b) => b.amount - a.amount);
            }, [filteredTransactions, categories]);

            // Группировка отфильтрованных транзакций по датам для истории
            const groupedTransactions = useMemo(() => {
                const groups = {};
                filteredTransactions.forEach(t => {
                    const date = t.date.split('T')[0];
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(t);
                });
                return Object.entries(groups).sort((a, b) => new Date(b[0]) - new Date(a[0]));
            }, [filteredTransactions]);

            return (
                <div className="space-y-8 animate-fade-in pb-10">
                    {/* Period Toggle */}

                                            key={c} 
                                            onClick={() => setColor(c)}
                                            className={`w-10 h-10 rounded-full shrink-0 transition-transform active:scale-90 flex items-center justify-center ring-offset-2 ring-offset-app-card ${color === c ? 'ring-2 ring-white scale-110' : ''}`}
                                            style={{ backgroundColor: c }}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Save Button */}
                        <div className="pt-4 pb-4 space-y-3">
                            {error && <div className="text-app-red text-sm text-center animate-fade-in">{error}</div>}
                            <button onClick={handleSubmit} className="w-full bg-app-purple text-white py-4 rounded-2xl font-semibold text-lg active:scale-95 transition-transform">
                                Создать
                            </button>
                        </div>

                    </div>
                </div>
            );
        };

        const AddAccountModal = ({ activeCurrencies, onClose, onAdd }) => {
            const available = AVAILABLE_CURRENCIES.filter(c => !activeCurrencies.includes(c.code));

            return (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-app-card w-full max-w-md rounded-t-3xl pt-2 pb-safe-bottom px-6 animate-slide-up h-[70dvh] flex flex-col">
                        
                        <div className="flex justify-between items-center py-4 border-b border-app-border mb-4">
                            <h2 className="text-xl font-semibold">Новый счет</h2>
                            <button onClick={onClose} className="p-2 -mr-2 text-app-textMuted active:bg-app-bg rounded-full"><Icons.Close /></button>
                        </div>

                        <div className="flex-1 overflow-y-auto hide-scrollbar space-y-4 pb-6 mt-2">
                            <p className="text-sm text-app-textMuted mb-2">Выберите валюту для нового счета. История операций и баланс будут вестись отдельно.</p>
                            
                            <div className="grid grid-cols-2 gap-3">
                                {available.map(c => (
                                    <button 
                                        key={c.code}
                                        onClick={() => onAdd(c.code)} 
                                        className="p-4 bg-app-bg border border-app-border rounded-2xl flex flex-col items-center gap-2 active:scale-95 transition-transform hover:border-app-purple"
                                    >
                                        <div className="w-12 h-12 rounded-full bg-app-card flex items-center justify-center text-2xl font-semibold border border-app-border">
                                            {c.symbol}
                                        </div>
                                        <span className="text-sm font-medium">{c.name} ({c.code})</span>
                                    </button>
                                ))}
                                {available.length === 0 && (
                                    <div className="col-span-2 text-center text-app-textMuted py-8">
                                        Все доступные валюты уже добавлены
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AddGoalModal = ({ initialData, currency, onClose, onSave }) => {
            const [title, setTitle] = useState(initialData?.title || '');
            const [targetAmount, setTargetAmount] = useState(initialData?.targetAmount || '');
            const [icon, setIcon] = useState(initialData?.icon || '🎯');
            const [color, setColor] = useState(initialData?.color || '#D85BCF');
            const [error, setError] = useState('');

            const COLORS = ['#D85BCF', '#A56BD6', '#6F7EDC', '#49D3B3', '#F6C34E', '#F39A3C', '#F06A5F', '#3A3A3A'];
            const ICONS = ['🎯', '🚗', '🏠', '✈️', '💻', '📱', '💍', '🎓', '🏥', '🐶', '👟', '🎮'];

            const handleSubmit = () => {
                if (!title) { setError('Введите название цели'); return; }
                if (!targetAmount || isNaN(targetAmount) || parseFloat(targetAmount) <= 0) { setError('Введите корректную сумму'); return; }
                
                onSave({ 
                    ...(initialData || {}),
                    title, 
                    targetAmount: parseFloat(targetAmount), 
                    icon, 
                    color 
                });
            };

            return (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-app-card w-full max-w-md rounded-t-3xl pt-2 pb-safe-bottom px-6 animate-slide-up h-[85dvh] flex flex-col">
                        
                        {/* Drag Handle & Close */}
                        <div className="flex justify-between items-center py-4">
                            <div className="w-6"></div>
                            <div className="w-12 h-1.5 bg-app-border rounded-full"></div>
                            <button onClick={onClose} className="p-2 -mr-2 text-app-textMuted active:bg-app-bg rounded-full"><Icons.Close /></button>
                        </div>

                        <div className="flex-1 overflow-y-auto hide-scrollbar space-y-6 pb-6">
                            <h2 className="text-xl font-semibold text-center mb-2">{initialData ? 'Редактировать цель' : 'Новая цель'}</h2>

                            {/* Title: text-base prevents iOS zoom */}
                            <div className="space-y-3">
                                <label className="text-sm font-medium text-app-textMuted">Название цели</label>
                                <input 
                                    type="text" 
                                    value={title}
                                    onChange={(e) => setTitle(e.target.value)}
                                    placeholder="Например: На машину"
                                    className="w-full bg-app-bg p-4 rounded-xl outline-none border border-app-border focus:border-app-purple transition-colors text-base"
                                />
                            </div>

                            {/* Amount: text-base prevents iOS zoom */}
                            <div className="space-y-3">
                                <label className="text-sm font-medium text-app-textMuted">Сколько нужно накопить?</label>
                                <div className="relative">
                                    <input 
                                        type="number" 
                                        inputMode="decimal"
                                        value={targetAmount}
                                        onChange={(e) => setTargetAmount(e.target.value)}
                                        placeholder="100000"
                                        className="w-full bg-app-bg p-4 pr-12 rounded-xl outline-none border border-app-border focus:border-app-purple transition-colors text-base"
                                    />
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-app-textMuted text-sm font-medium">{currency}</span>
                                </div>
                            </div>

                            {/* Icons */}
                            <div className="space-y-3">
                                <label className="text-sm font-medium text-app-textMuted">Эмодзи</label>
                                <div className="flex gap-3 overflow-x-auto hide-scrollbar py-1">
                                    {ICONS.map(i => (
                                        <button 
                                            key={i} 
                                            onClick={() => setIcon(i)}
                                            className={`w-12 h-12 rounded-2xl text-2xl flex items-center justify-center shrink-0 transition-all ${icon === i ? 'bg-app-border ring-2 ring-app-purple' : 'bg-app-bg'}`}
                                        >
                                            {i}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Colors */}
                            <div className="space-y-3">
                                <label className="text-sm font-medium text-app-textMuted">Цвет прогресса</label>
                                <div className="flex gap-4 overflow-x-auto hide-scrollbar py-2">
                                    {COLORS.map(c => (
                                        <button 
                                            key={c} 
                                            onClick={() => setColor(c)}
                                            className={`w-10 h-10 rounded-full shrink-0 transition-transform active:scale-90 flex items-center justify-center ring-offset-2 ring-offset-app-card ${color === c ? 'ring-2 ring-white scale-110' : ''}`}
                                            style={{ backgroundColor: c }}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Save Button */}
                        <div className="pt-4 pb-4 space-y-3">
                            {error && <div className="text-app-red text-sm text-center animate-fade-in">{error}</div>}
                            <button onClick={handleSubmit} className="w-full bg-app-purple text-white py-4 rounded-2xl font-semibold text-lg active:scale-95 transition-transform">
                                {initialData ? 'Сохранить изменения' : 'Создать'}
                            </button>
                        </div>

                    </div>
                </div>
            );
        };

        const GoalDetailsModal = ({ goal, currency, onClose, onTopUp, onEdit, onDelete, onComplete }) => {
            const [amount, setAmount] = useState('');
            const [confirmState, setConfirmState] = useState(null); // 'delete', 'complete'
            const [error, setError] = useState('');
            const isCompleted = goal.currentAmount >= goal.targetAmount;

            const handleTopUp = () => {
                if (!amount || isNaN(amount) || parseFloat(amount) <= 0) {
                    setError('Введите корректную сумму'); return;
                }
                const success = onTopUp(parseFloat(amount));
                if (!success) setError('Недостаточно средств на балансе');
            };

            return (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-app-card w-full max-w-md rounded-t-3xl pt-2 pb-safe-bottom px-6 animate-slide-up flex flex-col">
                        
                        <div className="flex justify-between items-center py-4">
                            <div className="w-6"></div>
                            <div className="w-12 h-1.5 bg-app-border rounded-full"></div>
                            <button onClick={onClose} className="p-2 -mr-2 text-app-textMuted active:bg-app-bg rounded-full"><Icons.Close /></button>
                        </div>

                        <div className="flex flex-col items-center pb-6 space-y-6">
                            
                            {/* Goal Info */}
                            <div className="flex flex-col items-center gap-2">
                                <CircularProgress progress={(goal.currentAmount/goal.targetAmount)*100} color={isCompleted ? '#4ADE80' : goal.color} icon={goal.icon} size={80} strokeWidth={6} />
                                <h2 className="text-xl font-semibold mt-2">{goal.title}</h2>
                                <p className="text-app-textMuted">{formatMoney(goal.currentAmount, currency)} / {formatMoney(goal.targetAmount, currency)}</p>
                            </div>

                            {/* Custom Confirmation UI */}
                            {confirmState ? (
                                <div className="w-full bg-app-bg p-5 rounded-2xl border border-app-border text-center space-y-4 animate-fade-in">
                                    <p className="text-sm font-medium">
                                        {confirmState === 'complete' ? 'Скрыть выполненную цель из списка?' : 'Точно удалить? Накопленные средства вернутся на баланс.'}
                                    </p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setConfirmState(null)} className="flex-1 bg-app-card border border-app-border py-3 rounded-xl font-medium active:scale-95 transition-transform text-sm">
                                            Отмена
                                        </button>
                                        <button onClick={() => confirmState === 'complete' ? onComplete() : onDelete()} className={`flex-1 py-3 rounded-xl font-medium active:scale-95 transition-transform text-sm ${confirmState === 'complete' ? 'bg-app-green text-[#121212]' : 'bg-app-red text-white'}`}>
                                            {confirmState === 'complete' ? 'Да, закрыть' : 'Да, удалить'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    {/* Conditional Top up or Complete state */}
                                    {isCompleted ? (
                                        <div className="w-full bg-app-green/10 p-5 rounded-2xl border border-app-green/30 text-center space-y-3">
                                            <div className="text-app-green font-bold text-lg flex items-center justify-center gap-2">
                                                <div className="w-6"><Icons.Check /></div> Цель достигнута!
                                            </div>
                                            <p className="text-sm text-app-textMuted">Вы накопили всю нужную сумму.</p>
                                            <button onClick={() => setConfirmState('complete')} className="w-full bg-app-green text-[#121212] py-3.5 rounded-xl font-bold active:scale-95 transition-transform shadow-lg shadow-app-green/20">
                                                Закрыть цель
                                            </button>
                                            <button onClick={() => setConfirmState('delete')} className="text-sm text-app-textMuted pt-3 pb-1 w-full active:scale-95 transition-transform hover:text-white">
                                                Отменить и вернуть деньги
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="w-full space-y-3 bg-app-bg p-4 rounded-2xl border border-app-border">
                                            <label className="text-sm font-medium text-app-textMuted">Внести в копилку</label>
                                            <div className="flex gap-2">
                                                {/* Amount: text-base prevents iOS zoom */}
                                                <input
                                                    type="number"
                                                    inputMode="decimal"
                                                    value={amount}
                                                    onChange={(e) => setAmount(e.target.value)}
                                                    placeholder="Сумма"
                                                    className="flex-1 min-w-0 bg-app-card p-3 rounded-xl outline-none border border-app-border focus:border-app-purple transition-colors text-base"
                                                />
                                                <button onClick={handleTopUp} className="shrink-0 whitespace-nowrap bg-app-purple text-white px-4 rounded-xl font-medium active:scale-95 transition-transform">
                                                    Пополнить
                                                </button>
                                            </div>
                                            {error && <div className="text-app-red text-xs pt-1">{error}</div>}
                                        </div>
                                    )}

                                    {/* Actions */}
                                    {!isCompleted && (
                                        <div className="w-full flex gap-3">
                                            <button onClick={onEdit} className="flex-1 flex items-center justify-center gap-2 bg-app-bg border border-app-border p-3 rounded-xl active:bg-app-card transition-colors">
                                                <Icons.Pencil /> <span className="text-sm font-medium">Изменить</span>
                                            </button>
                                            <button onClick={() => setConfirmState('delete')} className="flex-1 flex items-center justify-center gap-2 bg-app-red/10 text-app-red p-3 rounded-xl active:bg-app-red/20 transition-colors">
                                                <Icons.Trash /> <span className="text-sm font-medium">Удалить</span>
                                            </button>
                                        </div>
                                    )}
                                </>
                            )}
                            
                        </div>
                    </div>
                </div>
            );
        };

        // Рендер приложения
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
